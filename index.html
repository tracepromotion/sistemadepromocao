<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Promoções</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(270deg, rgb(255, 230, 0), #000);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      color: #ff0;
      margin-bottom: 10px;
    }

    #searchBar {
      width: 90%;
      max-width: 600px;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ff0;
      background-color: #000;
      color: #ff0;
    }

    .lista {
      max-width: 600px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button {
      background-color: #000;
      color: #ff0;
      border: 1px solid #ff0;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: #ff0;
      color: #000;
    }

    .popup-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      z-index: 1000;
      padding: 40px 0;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .promo-item {
      position: relative;
      margin-bottom: 40px;
      text-align: center;
    }

    .promo-item img {
      max-width: 90vw;
      max-height: 60vh;
      border-radius: 12px;
      box-shadow: 0 0 25px #ff0;
    }

    .copy-img-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #000;
      color: #ff0;
      border: 1px solid #ff0;
      border-radius: 8px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .copy-img-btn:hover {
      background-color: #ff0;
      color: #000;
    }

    .texto-box {
      position: relative;
      background-color: #111;
      border: 1px solid #ff0;
      border-radius: 8px;
      color: white;
      padding: 15px;
      width: 90%;
      max-width: 600px;
      margin: 10px auto 0 auto;
      box-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
    }

    .copy-text-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #000;
      color: #ff0;
      border: 1px solid #ff0;
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 12px;
      transition: 0.3s;
    }

    .copy-text-btn:hover {
      background-color: #ff0;
      color: #000;
    }

    .close-btn {
      position: fixed;
      top: 20px;
      right: 30px;
      background: none;
      color: white;
      font-size: 30px;
      border: none;
      opacity: 0.7;
      cursor: pointer;
      z-index: 1100;
    }

    .close-btn:hover {
      opacity: 1;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #ff0;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Sistema de Promoções</h1>
  <input type="text" id="searchBar" placeholder="Pesquise o nome do condomínio..." />
  <div class="lista" id="condominio-list"></div>

  <div class="popup-container" id="popup" style="display: none;">
    <button class="close-btn" onclick="fecharPopup()">&times;</button>
    <div id="promo-list"></div>
  </div>

  <script>
    /* ==========================
       1️⃣ DEFINIÇÃO DAS PROMOÇÕES
    ========================== */
    const promocoes = {
      "promo_amazon": [
        { imagem: "amazon.jpeg", texto: "🚨 DESCONTÃO pra fechar agora e assistir a todos os jogos da COPA !

A Copa 2026 terá 104 jogos, mas apenas a Amazon Prime transmitirá TODOS eles.

🎁 Comece pagando apenas R$ 69,99/mês e tenha: 

⚽ 600 Mega Fibra; 
⚽ Amazon Prime; 
⚽ SKY+ Light; 
⚽ Benefícios da Amazon; 
⚽ Os 104 jogos da Copa.

⏳ Oferta por tempo limitado.

R$ 69,99/mês nos 3 primeiros meses. Depois, R$ 99,99/mês. Fidelidade de 12 meses" }
      ],
      "promo_globo": [
        { imagem: "globopromo49e99.jpeg", texto: "🚨 Oferta Especial Chegando pra Você! 🚨

Imagina ter 600 Mega de internet e ainda curtir o Globoplay com séries, filmes e novelas incríveis? 😍
Agora é possível, e com um precinho que vai te surpreender:

💥 Apenas R$ 49,99 nos 3 primeiros meses!
Depois, só R$ 99,99 por mês.

Tudo isso com fidelidade de 12 meses e a qualidade que você merece! 💪

📲 Vai ficar de fora dessa? Quer aproveitar a oferta?" }
      ],
      "promo_amazon3499": [
        { imagem: "amazon3499.jpeg", texto: "🎁 *+50% OFF pra você fechar agora.*

Sabemos que Internet e Copa do Mundo movimenta o Brasil inteiro, 
*Por isso, liberamos uma condição especial para fechar agora:*

⚽ 600 Mega + Amazon Prime + SKY+ Light.

💰 Promoção de R$ 69,99 nos 3 primeiros meses.

🎁 E mais 50% OFF na 1ª mensalidade.

*Ou seja: você começa pagando apenas R$ 34,99 no primeiro mês.*

⏳ Essa condição foi liberada por tempo limitado" }
      ]
    };

    /* ==========================
       2️⃣ ASSOCIAÇÃO DOS CONDOMÍNIOS
    ========================== */
    const condominioMap = {
      "NORTE SAMBA", "PORTO CARIOCA", "TRENDY CACHAMBI", "PRIMOR CARIOCA", "DUET BARRA", "IPA STUDIO", "ICONYC BY YOO", "VIVAZ MARECHAL RONDON", "DEZ RAMOS", "APOGEU", "RESERVA CARIOCA PARK", "VARANDAS DO PARK", "VIVER MAIS CAMPO GRANDE", "ATMOSFERA", "ORLA RECREIO GRUMARI", "VITALE ECO", "RESIDENCIAL IPÊS", "URBAN SC", "TORRES DO MEIER", "VIVA VIDA STA CRUZ", "NOVOLAR VARGEM GRANDE", "LIVING SUNSET", "TUPINAMBÁS", "TULIPA", "DEZ BONSUCESSO", "BRITO 1 E 2", "PARQUE 2", "URBAN ZONA NORTE", "JARDIM DOS IPES 1, 2 E 3", "RESERVA DO PARQUE 1", "LIVING PARQUE JASMIM", "STILLO BARRA", "VIBE SUNSET", "RESERVA DO SOL", "RECANTO VERDE", "RIO WONDER CAIS", "VITALE ON", "CONNECT BONSUCESSO", "TRENDY CACHAMBI", "ORLA RECREIO RESERVA", "RIO ENERGY", "MU LIFE", "MY STYLE", "JERIVÁ", "SIDE PARK", "STILLO", "ORLA PRAIANHA", "PÁTIO ENG. NOVO", "ESPLENDOR CARIOCA", "CAIS DO VALONGO", "RIO WONDER MAUÁ", "PRAIA FORMOSA", "RECANTO DA SERRA", "PORTO VALENCA", "VILLAGGIO VENTURA", "RECANTO DA COLINA", "RECANTO DAS FLORES", "VILLAGGIO SILVESTRE", "NATURALIS", "BOSSA NOVA", "VILLAGGIO NOVITÁ", "RIO OCEANE", "QUINTA DOS IPÊS", "RIO SAMBA", "RIO ARARAS", "VIVA VIDA ZONA OESTE", "LIRIOS 1", "RIO JAZZ", "VIVA VIDA HARMONIA", "LIRIOS 2", "VILLAGGIO VERONA", "HIBISCO", "VIVA VIDA FELICIDADE", "VIVA VIDA RECANTO", "FLORENÇA", "WEST GARDEN", "RIO ROCK", "PARQUE TULIPA", "ARTE ROSÁRIO", "VIVA VIDA MOINHO", "RIO MANTIQUEIRA", "JARDIM JASMIM (tem plano light de 50mb)", "PORTO BARÃO", "RESIDENCIAL PEDRA DE GUARATIBA", "RETIRO DA SERRA", "RETIRO DOS PINHEIROS", "LIVING CHOICE JOÃO PINHEIRO", "SPAZIO ROCKFELLER", "ÚNICO ENGENHO NOVO", "DEZ ZONA NORTE", "COMPLETO ENGENHO NOVO", "SPAZIO ROOSEVELT", "VIVA MAIS ENGENHO NOVO", "DEZ IRAJA", "COMPLETO PIEDADE", "VIVAZ PIEDADE", "ÚNICO NOVA IGUAÇU", "VIVA VIDA ZONA NORTE", "URBAN SÃO CRISTOVÃO", "RIO WONDER PRAIA FORMOSA", "ALTO SAO CRISTÓVAO": ["promo_amazon", "promo_globo"],
      "PARQUE IRIS", "NOVOLAR RECREIO", "RESERVA PONTAL", "ÚNICO BONSUCESSO", "CARIOCA PARK", "RESERVA CARIOCA", "VIVAZ MAGARÇA", "PARQUE VIOLETA", "FLOR DE LARANJEIRA", "FLORES 1 E 2", "RESERVA DO PARQUE 2", "SPAZIO LIFE": ["promo_amazon", "promo_globo"],
      "NOVA IRAJÁ", "SOLAR DOS CANÁRIOS", "ENSEADA DO MAR", "ROYAL BLUE", "VIVAZ RAMOS", "MÉRITO", "COMPLETO BONSUCESSO", "GRAN ROYAL": ["promo_amazon3499", "promo_globo"],
    };
    /* ==========================
       3️⃣ LÓGICA DE EXIBIÇÃO
    ========================== */
    const listaContainer = document.getElementById("condominio-list");
    const popup = document.getElementById("popup");
    const promoList = document.getElementById("promo-list");
    const searchBar = document.getElementById("searchBar");

    const condominioNomes = Object.keys(condominioMap).sort((a, b) => a.localeCompare(b));

    condominioNomes.forEach(nome => {
      const btn = document.createElement("button");
      btn.innerText = nome;
      btn.onclick = () => mostrarPromocoes(nome);
      listaContainer.appendChild(btn);
    });

    searchBar.addEventListener("input", e => {
      const query = e.target.value.toLowerCase();
      Array.from(listaContainer.children).forEach(btn => {
        btn.style.display = btn.innerText.toLowerCase().includes(query) ? "block" : "none";
      });
    });

    function mostrarPromocoes(nome) {
      promoList.innerHTML = "";
      const promoKeys = condominioMap[nome];

      promoKeys.forEach(key => {
        const promoItens = promocoes[key];
        promoItens.forEach(promo => {
          const item = document.createElement("div");
          item.className = "promo-item";

          const img = document.createElement("img");
          img.src = promo.imagem;
          img.alt = nome;

          const copyImgBtn = document.createElement("button");
          copyImgBtn.className = "copy-img-btn";
          copyImgBtn.textContent = "Copiar Imagem";
          copyImgBtn.onclick = () => copiarImagem(promo.imagem);

          const textoBox = document.createElement("div");
          textoBox.className = "texto-box";
          textoBox.innerText = promo.texto;

          const copyTextBtn = document.createElement("button");
          copyTextBtn.className = "copy-text-btn";
          copyTextBtn.textContent = "Copiar Texto";
          copyTextBtn.onclick = () => copiarTexto(promo.texto);

          textoBox.appendChild(copyTextBtn);
          item.appendChild(img);
          item.appendChild(copyImgBtn);
          item.appendChild(textoBox);
          promoList.appendChild(item);
        });
      });

      popup.style.display = "flex";
    }

    function fecharPopup() {
      popup.style.display = "none";
    }

    function copiarTexto(texto) {
      navigator.clipboard.writeText(texto).then(() => {
        alert("Texto copiado!");
      });
    }

    async function copiarImagem(src) {
      try {
        const response = await fetch(src);
        const blob = await response.blob();
        await navigator.clipboard.write([
          new ClipboardItem({ [blob.type]: blob })
        ]);
        alert("Imagem copiada!");
      } catch (err) {
        alert("Falha ao copiar imagem.");
        console.error(err);
      }
    }
  </script>
</body>
</html>
